name: Protectoras

on:
    push:
        branches:
            - main
            - demo

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout del código
              uses: actions/checkout@v4

            - name: Set Deploy Path
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH_PROD }}" >> $GITHUB_ENV
                  elif [[ "${{ github.ref }}" == "refs/heads/demo" ]]; then
                    echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH_DEMO }}" >> $GITHUB_ENV
                  else
                    echo "❌ Error: Rama no autorizada para despliegue."
                    exit 1
                  fi

            # --- 1. Preparación y Compilación de Frontend (React) ---

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # Usa tu versión de Node.js

            - name: Instalar dependencias de React
              run: npm install --legacy-peer-deps

            - name: Compilar React (Generar 'public/build/')
              run: npm run build
              env:
                  VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
                  VITE_PUSHER_APP_CLUSTER: ${{ secrets.VITE_PUSHER_APP_CLUSTER }}
                  VITE_PUSHER_PORT: ${{ secrets.VITE_PUSHER_PORT }}
                  VITE_PUSHER_SCHEME: ${{ secrets.VITE_PUSHER_SCHEME }}
                  VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}                  

            # --- 2. Despliegue con Rsync (Sincronización + Limpieza) ---
            # Borra archivos remotos que no existan localmente (--delete),
            # pero respeta las exclusiones (--exclude) para no tocar archivos de usuario/generados.
            - name: Configurar llave SSH
              run: |
                  mkdir -p ~/.ssh/
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

            - name: Desplegar archivos (Rsync)
              run: |
                  rsync -avz --delete \
                      --exclude='.env' \
                      --exclude='.git' \
                      --exclude='.gitignore' \
                      --exclude='vendor' \
                      --exclude='node_modules' \
                      --exclude='bootstrap/cache/*' \
                      --exclude='resources/js' \
                      ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ env.DEPLOY_PATH }}

            - name: Ejecutar acciones con ssh en el server
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USERNAME }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                port: 22                
                script: |
                    cd ${{ env.DEPLOY_PATH }}
                    
                    # 1. Limpieza preventiva
                    rm -f public/hot
                    
                    # 2. Permisos (Asegura que Laravel pueda escribir sus propios caches)
                    # Intentamos dar permisos al grupo (donde debería estar nginx)
                    chmod -R 775 storage bootstrap/cache
                    
                    echo "--- Instalando dependencias de PHP ---"
                    composer install --no-dev --prefer-dist --optimize-autoloader
                    
                    echo "--- Limpiando y regenerando Caches ---"
                    # Es mejor limpiar antes de cachear de nuevo
                    php artisan config:clear
                    php artisan route:clear
                    php artisan view:clear
                    
                    # Cacheamos para mejorar rendimiento en producción
                    php artisan config:cache
                    php artisan route:cache
                    php artisan view:cache
                    
                    echo "--- Enlaces de Storage ---"
                    php artisan storage:link || true
                    
                    echo "--- Estado de la Aplicación ---"
                    php artisan about

            - name: Despliegue completado
              run: echo "✅ ¡Despliegue incremental completado!"
